<style>
:root{--bg:#0f0f1a;--card:#1a1a2e;--orange:#e8612a;--text:#ffffff;--muted:#8892a4;
--green:#22c55e;--red:#ef4444;--gray:#374151;--border:#2a2a44;--soft:rgba(232,97,42,.14);}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--text);line-height:1.45;
font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
-webkit-font-smoothing:antialiased;}
a{color:inherit;}
.nav{display:flex;gap:6px;flex-wrap:wrap;padding:14px 20px;background:var(--card);
border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;}
.nav a{color:var(--muted);text-decoration:none;font-weight:600;font-size:14px;
padding:8px 14px;border-radius:8px;}
.nav a:hover{color:var(--text);background:rgba(255,255,255,.05);}
.nav a.active{color:#fff;background:var(--orange);}
.wrap{max-width:1000px;margin:0 auto;padding:28px 20px 64px;}
h1{font-size:clamp(24px,5vw,38px);font-weight:800;letter-spacing:-.02em;margin:0 0 6px;}
h1 .accent{color:var(--orange);}
h2{font-size:18px;font-weight:700;margin:30px 0 12px;}
.subtitle{color:var(--muted);font-size:15px;font-weight:500;margin:0;}
.controls{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin:24px 0 12px;}
#search{flex:1 1 260px;background:var(--card);border:1px solid var(--border);border-radius:10px;
color:var(--text);font-size:15px;font-family:inherit;padding:12px 14px;outline:none;}
#search::placeholder{color:var(--muted);}
#search:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--soft);}
.count{color:var(--muted);font-size:14px;font-weight:500;white-space:nowrap;}
.count b{color:var(--orange);font-weight:700;}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.table-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14.5px;}
thead th{position:sticky;top:53px;background:#22223e;color:var(--muted);text-align:left;
font-weight:600;font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;padding:13px 16px;
cursor:pointer;user-select:none;white-space:nowrap;border-bottom:1px solid var(--border);}
thead th:hover{color:var(--text);}
thead th.active{color:var(--text);}
thead th .arrow{color:var(--orange);font-size:11px;margin-left:5px;}
th.col-streak,td.col-streak{text-align:right;}
tbody td{padding:11px 16px;border-bottom:1px solid rgba(42,42,68,.6);white-space:nowrap;}
tbody tr:nth-child(even){background:rgba(255,255,255,.02);}
tbody tr:hover{background:var(--soft);}
.col-rank{color:var(--muted);font-variant-numeric:tabular-nums;width:60px;}
.col-streak{font-weight:700;color:var(--orange);font-variant-numeric:tabular-nums;}
.col-date{color:var(--muted);font-variant-numeric:tabular-nums;}
.plink{color:#fff;text-decoration:none;font-weight:600;border-bottom:1px dotted rgba(232,97,42,.5);}
.plink:hover{color:var(--orange);}
.empty{padding:40px 16px;text-align:center;color:var(--muted);}
footer{margin-top:28px;color:var(--muted);font-size:13px;text-align:center;}
/* player page */
.badges{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0 4px;}
.badge{padding:8px 14px;border-radius:999px;font-weight:700;font-size:14px;border:1px solid var(--border);}
.badge.on{background:var(--soft);border-color:var(--orange);color:#fff;}
.badge.on b{color:var(--orange);}
.badge.off{background:rgba(255,255,255,.03);color:var(--muted);}
.legend{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin-bottom:14px;}
.legend span{display:inline-flex;align-items:center;gap:6px;}
.sq{display:inline-block;width:11px;height:11px;margin:1.5px;border-radius:2px;vertical-align:middle;}
.sq.g{background:var(--green);}.sq.r{background:var(--red);}.sq.d{background:var(--gray);}
.trow{display:flex;gap:14px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(42,42,68,.5);}
.tlabel{width:170px;flex:none;}
.tseason{display:block;font-weight:700;font-size:14px;}
.tteam{display:block;color:var(--muted);font-size:12.5px;}
.tsquares{flex:1;min-width:0;line-height:1;}
.absbtn{background:var(--card);color:#fff;border:1px solid var(--border);border-radius:10px;
padding:10px 16px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;}
.absbtn:hover{border-color:var(--orange);}
.abstable{width:100%;border-collapse:collapse;font-size:14px;margin-top:12px;}
.abstable th{text-align:left;color:var(--muted);font-size:12px;text-transform:uppercase;
letter-spacing:.04em;padding:9px 12px;border-bottom:1px solid var(--border);}
.abstable td{padding:9px 12px;border-bottom:1px solid rgba(42,42,68,.5);}
.abstable .num{font-variant-numeric:tabular-nums;}
.backlink{margin-top:30px;}
.backlink a{color:var(--orange);text-decoration:none;font-weight:600;}
@media(max-width:560px){.wrap{padding:20px 12px 48px;}.trow{flex-direction:column;gap:4px;}
.tlabel{width:auto;}thead th{top:0;position:static;}}
</style>
</head>
