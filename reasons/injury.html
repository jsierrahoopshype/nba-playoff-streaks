/* global player search (#11) */
.psearch-wrap{position:relative;margin:0 0 1rem;}
.psearch{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);
font-size:.9rem;font-family:inherit;padding:.6rem .8rem;outline:none;transition:.15s;}
.psearch::placeholder{color:var(--muted);}
.psearch:hover{border-color:var(--accent);}
.psearch:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
.ac{position:absolute;top:100%;left:0;right:0;margin-top:.25rem;background:var(--surface);border:1px solid var(--border);
border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:20rem;overflow-y:auto;z-index:60;display:none;}
.ac.open{display:block;}
.ac-item{display:block;padding:.55rem .8rem;border-bottom:1px solid var(--border);font-size:.88rem;color:var(--text);text-decoration:none;}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item.sel{background:var(--surface-hover);color:var(--accent);}
.ac-empty{padding:.7rem .8rem;color:var(--muted);font-size:.8rem;text-align:center;}

/* nav tabs */
.nav{display:flex;gap:.3rem;flex-wrap:wrap;max-width:1280px;margin:0 auto;padding:1.5rem 1.5rem .3rem;}
.nav a{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;padding:.4rem .8rem;
border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--muted);text-decoration:none;}
.nav a:hover{border-color:var(--accent);color:var(--accent);}
.nav a.active{background:var(--accent);border-color:var(--accent);color:#fff;}

.wrap{max-width:1280px;margin:0 auto;padding:.5rem 1.5rem 4rem;}
header{margin-bottom:1rem;}
.brand{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);
text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:.3rem;}
h1{font-size:clamp(1.4rem,3.5vw,1.7rem);font-weight:700;letter-spacing:-.03em;margin:0 0 .3rem;
display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
h1 .accent{color:var(--accent);}
h2{font-size:1.15rem;font-weight:700;letter-spacing:-.025em;margin:2rem 0 .7rem;padding-bottom:.4rem;
border-bottom:2px solid var(--text);color:var(--text);display:flex;align-items:baseline;gap:.5rem;flex-wrap:wrap;}
h3{font-size:.95rem;font-weight:700;margin:1.2rem 0 .5rem;}
.subtitle{color:var(--muted);font-size:.9rem;font-weight:400;margin:0;max-width:60rem;}
.backtop{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.78rem;
color:var(--muted);margin:0 0 1rem;text-decoration:none;}
.backtop:hover{color:var(--accent);}

.controls{display:flex;flex-wrap:wrap;align-items:center;gap:.6rem;margin:.6rem 0;}
.search{flex:1 1 100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);
font-size:.9rem;font-family:inherit;padding:.6rem .8rem;outline:none;transition:.15s;}
.search::placeholder{color:var(--muted);}
.search:hover{border-color:var(--accent);}
.search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
.count{color:var(--muted);font-size:.74rem;}
.count b{color:var(--text);font-weight:600;}

/* Section boxes: scroll horizontally WITHIN the card if a row is wider than the
   viewport (mobile, or a rare 4–5 team streak) instead of clipping the Team column
   or forcing the whole page to scroll. On desktop the content fits, so no scrollbar. */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow-x:auto;}
table.board{width:100%;border-collapse:collapse;font-size:.86rem;}
table.board thead th{background:var(--surface-hover);color:var(--muted);text-align:left;
font-weight:600;font-size:.66rem;letter-spacing:.04em;text-transform:uppercase;padding:.6rem .7rem;
cursor:pointer;user-select:none;white-space:nowrap;border-bottom:1px solid var(--border);}
table.board thead th:hover,table.board thead th.active{color:var(--accent);}
table.board thead th .arrow{color:var(--accent);font-size:.6rem;margin-left:.2rem;}
/* #6/#5: numeric & date columns centre-aligned, header + cell together. Must be
   qualified with table.board to outrank `table.board thead th{text-align:left}`. */
table.board th.col-rank,table.board td.col-rank,
table.board th.col-streak,table.board td.col-streak,
table.board th.col-date,table.board td.col-date{text-align:center;}
table.board th.col-team,table.board td.col-team{text-align:left;}
/* Team column a hair smaller so even multi-city streaks fit on one line. NO
   width:100% — a percentage width on a nowrap cell makes the browser size the whole
   table past the card, pushing this last column off the right edge (the real cause
   of the "Por..." cut-off). Let table-layout:auto size it from content instead. */
table.board td.col-team{font-size:.76rem;}
table.board thead th{padding:.6rem .55rem;}
table.board tbody td{padding:.5rem .55rem;border-bottom:1px solid var(--border);white-space:nowrap;
font-family:'JetBrains Mono',monospace;font-weight:500;font-variant-numeric:tabular-nums;}
/* utility: keep a cell on one line (e.g. the Iron Man "Teams" list) */
.nowrapcell{white-space:nowrap;}
table.board tbody td.col-player{font-family:'DM Sans',sans-serif;text-align:left;}
table.board tbody tr:last-child td{border-bottom:none;}
table.board tbody tr:hover{background:var(--surface-hover);}
.col-rank{color:var(--muted);font-variant-numeric:tabular-nums;width:3.2rem;font-size:.78rem;}
.col-streak{font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;}
.col-date{color:var(--muted);font-variant-numeric:tabular-nums;}
.plink{color:var(--text);text-decoration:none;font-weight:600;}
.plink:hover{color:var(--accent);}
.empty{padding:2.5rem 1rem;text-align:center;color:var(--muted);}

.badges{display:flex;flex-wrap:wrap;gap:.5rem;margin:.7rem 0 .2rem;}
.badge{font-family:'JetBrains Mono',monospace;padding:.4rem .7rem;border-radius:8px;font-weight:500;
font-size:.72rem;border:1px solid var(--border);background:var(--surface);color:var(--muted);}
.badge.on{background:var(--accent-dim);border-color:var(--accent);color:var(--text);}
.badge.on b{color:var(--accent);}
.badge.off{opacity:.65;}

.legend{display:flex;gap:1rem;flex-wrap:wrap;color:var(--muted);font-size:.78rem;margin:.4rem 0 .9rem;}
.legend span{display:inline-flex;align-items:center;gap:.4rem;}
.sq{display:inline-block;width:11px;height:11px;margin:1.5px;border-radius:2px;vertical-align:middle;}
.sq.g{background:var(--green);}.sq.r{background:var(--red);}.sq.d{background:var(--gray);}
.tlcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.4rem 1rem;}
.trow{display:flex;gap:14px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);}
.trow:last-child{border-bottom:none;}
.tlabel{width:170px;flex:none;}
.tseason{display:block;font-weight:700;font-size:.86rem;}
.tteam{display:block;color:var(--muted);font-size:.74rem;font-family:'JetBrains Mono',monospace;}
.tsquares{flex:1;min-width:0;line-height:1;}

.dtable{width:100%;border-collapse:collapse;font-size:.84rem;}
.dtable thead th{text-align:left;color:var(--muted);font-size:.66rem;text-transform:uppercase;letter-spacing:.04em;
font-weight:600;padding:.6rem .8rem;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;
background:var(--surface-hover);}
.dtable thead th.active{color:var(--accent);}
.dtable thead th .arrow{color:var(--accent);font-size:.6rem;margin-left:.2rem;}
.dtable td{padding:.5rem .8rem;border-bottom:1px solid var(--border);}
.dtable tbody tr:last-child td{border-bottom:none;}
.dtable tbody tr:hover{background:var(--surface-hover);}
.dtable .num{font-variant-numeric:tabular-nums;font-family:'JetBrains Mono',monospace;}
/* #2: numeric/date columns centre-aligned, header + cell together */
.dtable th.num,.dtable td.num{text-align:center;}

/* #5: career games-played stacked bar */
.gpwrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;}
.gpbar{display:flex;height:1.6rem;border-radius:6px;overflow:hidden;background:var(--surface-hover);}
.gpseg{height:100%;}
.gpseg.g{background:var(--green);}.gpseg.r{background:var(--red);}.gpseg.d{background:var(--gray);}
.gplegend{display:flex;flex-wrap:wrap;gap:1.2rem;margin-top:.7rem;font-size:.8rem;color:var(--muted);
font-family:'JetBrains Mono',monospace;}
.gplegend span{display:inline-flex;align-items:center;gap:.4rem;}
.gplegend .sw{width:11px;height:11px;border-radius:2px;display:inline-block;}
.gplegend .sw.g{background:var(--green);}.gplegend .sw.r{background:var(--red);}.gplegend .sw.d{background:var(--gray);}
.gpsub{margin-top:.55rem;padding-top:.55rem;border-top:1px solid var(--border);font-size:.78rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.showall{margin-top:.7rem;background:none;color:var(--accent);border:none;font-family:'JetBrains Mono',monospace;
font-size:.74rem;cursor:pointer;}
.showall:hover{text-decoration:underline;}
.gbtn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:50%;width:20px;height:20px;
cursor:pointer;font-size:.7rem;line-height:1;padding:0;}
.gbtn:hover{color:var(--accent);border-color:var(--accent);}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal.open{display:flex;}
.modal-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;max-width:560px;width:100%;max-height:80vh;overflow:auto;padding:1.4rem;}
.simgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.6rem;margin-top:.4rem;}
.simcard{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:.7rem .8rem;text-decoration:none;color:var(--text);display:block;}
.simcard:hover{border-color:var(--accent);}
.simcard .nm{font-weight:600;font-size:.84rem;}
.simcard .st{color:var(--accent);font-weight:700;font-size:.76rem;margin-top:.25rem;font-family:'JetBrains Mono',monospace;}
.reasonblock{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.9rem 1.1rem;margin-bottom:.9rem;}
.reasonblock h2{margin:0 0 .3rem;font-size:1rem;text-transform:none;letter-spacing:-.01em;border-bottom:none;padding-bottom:0;color:var(--text);}
.reasonblock h2 a{color:var(--text);text-decoration:none;}
.reasonblock h2 a:hover{color:var(--accent);}
.rcount{color:var(--muted);font-size:.72rem;font-weight:500;font-family:'JetBrains Mono',monospace;}
.foot{text-align:center;font-size:.72rem;color:var(--muted);margin-top:1.4rem;font-family:'JetBrains Mono',monospace;line-height:1.7;}
/* Mobile (<=720px): turn every leaderboard / data table into a stacked list of
   cards (Media Vote Tracker pattern) so the PAGE never scrolls horizontally. The
   table/thead/tbody/tr/td go display:block; thead is hidden; each <tr> becomes a
   rounded card and each <td> becomes a "LABEL ........ value" line via data-label. */
@media(max-width:720px){
.wrap{padding:.5rem .9rem 3rem;}
.nav{padding:1rem .9rem .3rem;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.nav a{flex:0 0 auto;}
h1{font-size:1.3rem;}h2{font-size:1.05rem;margin:1.5rem 0 .6rem;}
.gpwrap{padding:.8rem .9rem;}.gplegend{gap:.7rem 1rem;font-size:.74rem;}.gpsub{font-size:.72rem;}
.sq{width:9px;height:9px;margin:1px;}.tsquares{line-height:1;}

/* scope to tables inside a .table-card so the small reasons-index lists are untouched.
   Each <td> is display:block with the label ABSOLUTELY pinned left and the value
   flowing in a left-padded region, so long values wrap inside the card (a flex
   space-between row would let them spill past the right edge -> horizontal scroll). */
.table-card{overflow:visible;border:none;background:transparent;border-radius:0;}
.table-card table.board,.table-card table.board tbody,
.table-card table.dtable,.table-card table.dtable tbody{display:block;width:100%;}
.table-card table.board thead,.table-card table.dtable thead{display:none;}
.table-card table.board tbody tr,.table-card table.dtable tbody tr{display:block;position:relative;
background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.7rem 3rem .7rem .9rem;margin-bottom:.6rem;}
.table-card table.board tbody tr:hover,.table-card table.dtable tbody tr:hover{background:var(--surface);}
.table-card table.board tbody td,.table-card table.dtable td{display:block;position:relative;border:none;
white-space:normal;text-align:left;padding:.14rem 0 .14rem 6.4rem;font-size:.86rem;line-height:1.4;min-height:1.5em;
overflow-wrap:anywhere;}
.table-card table.board tbody td::before,.table-card table.dtable td::before{content:attr(data-label);
position:absolute;left:0;top:.2rem;width:5.9rem;font-family:'DM Sans',sans-serif;font-size:.6rem;font-weight:700;
text-transform:uppercase;letter-spacing:.05em;color:var(--muted);line-height:1.3;}
.table-card table.dtable td.nowrapcell{white-space:normal;}
/* a cell with no data-label (e.g. the empty-search row) shouldn't reserve a label gutter */
.table-card td:not([data-label]){padding-left:0;}
.table-card td:not([data-label])::before{content:none;}
/* rank: small, pinned top-right, no label */
.table-card table.board tbody td.col-rank{position:absolute;top:.55rem;right:.85rem;padding:0;font-size:.66rem;color:var(--muted);min-height:0;}
.table-card table.board tbody td.col-rank::before{display:none;}
/* player name: prominent, full-width, no label/indent */
.table-card table.board tbody td.col-player{padding:0 0 .3rem;font-family:'DM Sans',sans-serif;font-size:1.02rem;font-weight:600;}
.table-card table.board tbody td.col-player::before{display:none;}
/* streak: big accent value (label stays small via ::before) */
.table-card table.board tbody td.col-streak{font-size:1.1rem;font-weight:700;color:var(--accent);}
/* dtable lead column (Games / Games Missed): emphasised accent value */
.table-card table.dtable tbody td:first-child{font-size:1rem;font-weight:700;color:var(--accent);}
}
@media(max-width:560px){.wrap{padding:.5rem 1rem 3rem;}.nav{padding:1rem 1rem .3rem;}.trow{flex-direction:column;gap:4px;}.tlabel{width:auto;}.sq{width:8px;height:8px;}}
</style>

      items=build(q);
      if(!items.length){ac.innerHTML='<div class="ac-empty">No players found</div>';ac.classList.add('open');return;}
      ac.innerHTML=items.map(function(m,i){return '<a class="ac-item'+(i===sel?' sel':'')+'" href="'+PLAYER_PREFIX+m[1]+'.html">'+esc(m[0])+'</a>';}).join('');
      ac.classList.add('open');}
    inp.addEventListener('input',function(){sel=-1;render();});
    inp.addEventListener('keydown',function(e){
      if(!items.length)return;
      if(e.key==='ArrowDown'){e.preventDefault();sel=(sel+1)%items.length;render();}
      else if(e.key==='ArrowUp'){e.preventDefault();sel=(sel-1+items.length)%items.length;render();}
      else if(e.key==='Enter'&&sel>=0){e.preventDefault();window.location.href=PLAYER_PREFIX+items[sel][1]+'.html';}
      else if(e.key==='Escape'){ac.classList.remove('open');}});
    inp.addEventListener('blur',function(){setTimeout(function(){ac.classList.remove('open');},150);});
  }
  document.querySelectorAll('.psearch').forEach(wire);
})();
</script>

</body>
</html>
